services:
  postgres:
    image: postgres:16
    container_name: justiceai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: justiceai
      POSTGRES_USER: justiceai
      POSTGRES_PASSWORD: justiceai
    ports:
      - "5432:5432"
    volumes:
      - ./docker-data/postgres:/var/lib/postgresql/data
      - ./backend-rust/sql/init_import_tables.sql:/docker-entrypoint-initdb.d/001-init_import_tables.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U justiceai -d justiceai"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend-rust
      dockerfile: Dockerfile
    container_name: justiceai-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: development
      RUST_LOG: info,sqlx=warn,tower_http=info
      APP__NAME: JusticeAI Backend
      APP__HOST: 0.0.0.0
      APP__PORT: 8088
      APP__ENV: development
      DATABASE__URL: postgres://justiceai:justiceai@postgres:5432/justiceai
      DATABASE__MAX_CONNECTIONS: 10
      DATABASE__ACQUIRE_TIMEOUT_SECS: 5
      HUGEGRAPH__BASE_URL: http://host.docker.internal:8080
      HUGEGRAPH__GREMLIN_URL: ws://host.docker.internal:8182/gremlin
      HUGEGRAPH__USERNAME: admin
      HUGEGRAPH__PASSWORD: admin
      MILVUS__ADDRESS: http://host.docker.internal:19530
      MILVUS__USERNAME: root
      MILVUS__PASSWORD: Milvus
      MILVUS__TOKEN: root:Milvus
      VLLM__BASE_URL: http://host.docker.internal:8000/v1
      VLLM__MODEL_NAME: Qwen2.5-Coder-7B-Instruct
      EMBEDDING__BASE_URL: http://host.docker.internal:7997/v1
      EMBEDDING__MODEL_NAME: BAAI/bge-small-zh-v1.5
      EMBEDDING__API_KEY: ""
      EMBEDDING__ENDPOINT: /embeddings
      STORAGE__UPLOAD_DIR: /data/uploads
      STORAGE__REPORT_DIR: /data/reports
      STORAGE__TRAINING_DIR: /data/training
    ports:
      - "8088:8088"
    volumes:
      - ./docker-data/runtime/uploads:/data/uploads
      - ./docker-data/runtime/reports:/data/reports
      - ./docker-data/runtime/training:/data/training

  frontend:
    build:
      context: ./frontend-vue
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: justiceai-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "18100:80"

  milvus:
    image: milvusdb/milvus:v2.4.15
    container_name: justiceai-milvus
    profiles:
      - vector
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_USE_EMBED: "true"
      ETCD_DATA_DIR: /var/lib/milvus/etcd
      ETCD_CONFIG_PATH: /milvus/configs/embedEtcd.yaml
      COMMON_STORAGETYPE: local
      DEPLOY_MODE: STANDALONE
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - ./docker-data/milvus:/var/lib/milvus
      - ./local-services/milvus/embedEtcd.yaml:/milvus/configs/embedEtcd.yaml:ro
      - ./local-services/milvus/user.yaml:/milvus/configs/user.yaml:ro
